<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antigravity Cowork</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body class="cowork">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="brand-title">Antigravity</div>
          <div class="brand-subtitle" id="targetSubtitle">Cowork</div>
        </div>
      </div>
      <div class="top-actions">
        <button
          id="focusBtn"
          class="icon-btn"
          type="button"
          title="Focus mode"
          aria-label="Focus mode"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="2" x2="12" y2="5"></line>
            <line x1="12" y1="19" x2="12" y2="22"></line>
            <line x1="2" y1="12" x2="5" y2="12"></line>
            <line x1="19" y1="12" x2="22" y2="12"></line>
          </svg>
        </button>
        <button
          id="settingsBtn"
          class="icon-btn"
          type="button"
          title="Settings"
          aria-label="Settings"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <button
          id="clearBtn"
          class="icon-btn"
          type="button"
          title="Clear"
          aria-label="Clear conversation"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
          </svg>
        </button>
      </div>
    </header>

    <section id="thinkingStrip" class="thinking-strip" aria-live="polite">
      <span class="thinking-pulse" aria-hidden="true"></span>
      <span id="thinkingText" class="thinking-text">Idle</span>
      <span id="thinkingStage" class="thinking-stage">Ready</span>
      <span id="thinkingElapsed" class="thinking-elapsed">00:00</span>
    </section>

    <main id="timeline" class="timeline" aria-live="polite"></main>

    <div class="composer">
      <div class="composer-input">
        <select id="brainSelect" class="brain-select" title="Brain">
          <option value="claude">Claude</option>
          <option value="chatgpt">ChatGPT</option>
          <option value="gemini">Gemini</option>
          <option value="notebooklm">NotebookLM</option>
          <option value="antigravity">Antigravity</option>
        </select>
        <textarea
          id="promptInput"
          rows="1"
          placeholder="Describe the task and goal..."
        ></textarea>
        <button
          id="sendBtn"
          class="send-btn"
          type="button"
          title="Send"
          aria-label="Send"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <div class="quick-row">
        <button id="miniFocusBtn" class="tiny-btn tiny-btn--accent" type="button">Focus</button>
        <button id="miniMoreBtn" class="tiny-btn" type="button">Advanced</button>
      </div>

      <div id="advancedRow" class="quick-row quick-row--advanced">
        <button id="miniClearBtn" class="tiny-btn" type="button">Clear</button>
        <button id="miniSettingsBtn" class="tiny-btn" type="button">Settings</button>
      </div>

      <div class="status-row">
        <span id="status" class="status">Ready</span>
        <button
          id="stopBtn"
          class="stop-btn"
          title="Stop agent"
          style="display: none"
        >
          Stop
        </button>
      </div>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
